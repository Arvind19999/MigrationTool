version: "3.9"

services:
  api:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - ./app:/app/app
      - ./job_store:/app/job_store
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_TEST_SCRIPT=/opt/spark/jobs/check_connection.py
      - SPARK_IVY_CACHE=/tmp/ivy
      - SPARK_PIPELINE_SCRIPT=/opt/spark/jobs/pipeline_main.py
    command: uvicorn app.main:app --host 0.0.0.0 --port 9000 --reload
    networks:
      - spark-net

networks:
  spark-net:
    external: true
