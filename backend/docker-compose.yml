services:
  api:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - ./app:/app/app
      - ./job_store:/app/job_store
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    environment:
      - DATABASE_URL=postgresql+psycopg://elt:elt@postgres:5432/elt
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_TEST_SCRIPT=/opt/spark/jobs/connection_test/check_connection.py
      - SPARK_IVY_CACHE=/tmp/ivy
      - SPARK_PIPELINE_SCRIPT=/opt/spark/jobs/pipeline_main.py
      - DOCKER_BIN=/usr/bin/docker
    command: uvicorn app.main:app --host 0.0.0.0 --port 9000 --reload
    networks:
      - spark-net
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=elt
      - POSTGRES_PASSWORD=elt
      - POSTGRES_DB=elt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spark-net

networks:
  spark-net:
    external: true

volumes:
  postgres_data:
