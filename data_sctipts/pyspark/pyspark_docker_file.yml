services:

  spark-master:
    image: apache/spark:3.5.5
    container_name: spark-master
    hostname: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "9001:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC port
    volumes:
      - ./data:/opt/spark/data
      - /home/arvind/Desktop/projects/data/etl/data_sctipts/connection_test:/opt/spark/jobs/connection_test
      - /home/arvind/Desktop/projects/data/etl/data_sctipts/pipelines:/opt/spark/jobs/pipelines
      - ./jars:/opt/spark/external-jars
      - spark-master-logs:/opt/spark/logs
    networks:
      - spark-net

  spark-worker-1:
    image: apache/spark:3.5.5
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8081:8081"   # Worker 1 Web UI
    volumes:
      - ./data:/opt/spark/data
      - /home/arvind/Desktop/projects/data/etl/data_sctipts/connection_test:/opt/spark/jobs/connection_test
      - /home/arvind/Desktop/projects/data/etl/data_sctipts/pipelines:/opt/spark/jobs/pipelines
      - ./jars:/opt/spark/external-jars
      - spark-worker-1-logs:/opt/spark/logs
    networks:
      - spark-net

  spark-worker-2:
    image: apache/spark:3.5.5
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8082:8081"   # Worker 2 Web UI
    volumes:
      - ./data:/opt/spark/data
      - /home/arvind/Desktop/projects/data/etl/data_sctipts/connection_test:/opt/spark/jobs/connection_test
      - /home/arvind/Desktop/projects/data/etl/data_sctipts/pipelines:/opt/spark/jobs/pipelines
      - ./jars:/opt/spark/external-jars
      - spark-worker-2-logs:/opt/spark/logs
    networks:
      - spark-net

volumes:
  spark-master-logs:
  spark-worker-1-logs:
  spark-worker-2-logs:

networks:
  spark-net:
    driver: bridge



